id: IR-012
name: API Abuse and Credential Stuffing Attack Response
version: 1.0.0
author: CostNimbus
category: network
severity: [medium, high, critical]
mitre_attack:
  - T1110.004   # Credential Stuffing
  - T1110.003   # Password Spraying
  - T1078       # Valid Accounts
  - T1539       # Steal Web Session Cookie
  - T1552.001   # Credentials In Files
  - T1190       # Exploit Public-Facing Application
  - T1499.002   # Service Exhaustion Flood (API rate abuse)
trigger:
  - api_gateway_rate_limit_breach
  - waf_credential_stuffing_alert
  - siem_4xx_spike
  - siem_impossible_travel_api_token
  - siem_geographic_anomaly_api
  - bot_protection_alert
  - account_lockout_spike
tags:
  - api
  - credential-stuffing
  - rate-limiting
  - api-gateway
  - token-theft
  - bot-attack
  - brute-force
  - ip-blocking
tools_required:
  - api_gateway
  - waf
  - siem
  - threat_intelligence_platform
  - identity_provider
  - rate_limiting_platform
estimated_time: 45m

integrations:
  - platform: aws_api_gateway
    optional: true
    notes: "Usage plans, throttling, and API key management"
  - platform: cloudflare
    optional: true
    notes: "WAF rules, bot management, and IP reputation blocking"
  - platform: okta
    optional: true
    notes: "Identity threat protection and session management for API token issuance"
  - platform: splunk
    optional: true
    notes: "API access log ingestion and 4xx rate anomaly detection"
  - platform: datadog
    optional: true
    notes: "APM trace analysis for credential stuffing pattern detection"

steps:
  - id: step-1
    name: Confirm the attack pattern and identify targeted endpoints
    type: investigation
    tool: api_gateway
    description: >
      Review the triggering alert and confirm the attack type. Credential stuffing presents as
      a high volume of authentication attempts using valid-format credentials from distributed
      IPs with low success rates (~0.1-2%). API abuse may show as rate limit breaches, unusual
      endpoint targeting, or token enumeration. Identify exactly which API endpoints are under
      attack, the attack start time, source IPs/ASNs, and the volume. Determine if the attack
      is still in progress.
    automation_hint: >
      AWS API Gateway: aws apigateway get-usage --usage-plan-id <plan> --start-date <date> --end-date <date>
      Cloudflare: GET https://api.cloudflare.com/client/v4/zones/<zone>/security/events
      SIEM (Splunk): index=api_logs status>=400 status<500 | timechart count by uri
      | where count > threshold — identify top targeted endpoints
    outputs:
      - targeted_endpoints
      - attack_start_time
      - source_ip_ranges
      - attack_still_active

  - id: step-2
    name: Analyze 4xx spike and identify credential stuffing signatures
    type: investigation
    tool: siem
    description: >
      Pull API access logs for the anomaly window and build the attack signature. For credential
      stuffing: look for high 401/403 rates from the same IP or user-agent, sequential username
      enumeration, distributed low-and-slow patterns across many IPs, and identical request
      timing intervals (bot automation). Calculate the hit rate (successful logins / total attempts).
      Identify any compromised accounts where login succeeded.
    automation_hint: >
      Splunk: index=api_logs action=login | stats count(eval(status=200)) as success,
      count(eval(status=401)) as fail by src_ip | eval hit_rate=round(success/(success+fail)*100,2)
      | where fail > 50 | sort -fail
      ELK: GET /api_logs/_search — agg by client_ip, filter status:401, bucket by 5min intervals
      Check for same user-agent, fixed request intervals (sign of automation)
    outputs:
      - attack_signature
      - compromised_accounts
      - hit_rate_percentage
      - bot_indicators

  - id: step-3
    name: Detect impossible travel and geographic anomalies on API tokens
    type: investigation
    tool: siem
    description: >
      Check all API tokens that authenticated successfully during the attack window for
      impossible travel: the same token used from two geographically distant IPs within
      a time window that is physically impossible to travel between. Also flag logins from
      high-risk countries (if not expected), Tor exit nodes, known VPN/proxy providers, and
      data centers (legitimate users rarely authenticate from cloud provider IP ranges).
      Correlate with user's historical access patterns.
    automation_hint: >
      MaxMind GeoIP lookup: curl https://ipinfo.io/<ip>/json
      Impossible travel query (Splunk): index=api_auth_logs
      | sort by user, _time | streamstats current=false last(_time) as prev_time, last(src_country) as prev_country by user
      | eval hours_diff=round(((_time-prev_time)/3600),2)
      | where src_country!=prev_country AND hours_diff < 4
      | table user, src_ip, src_country, prev_country, hours_diff
    outputs:
      - impossible_travel_events
      - high_risk_geo_logins
      - tokens_to_revoke

  - id: step-4
    name: Block attacking IPs and apply emergency rate limiting
    type: action
    tool: waf
    description: >
      Apply immediate containment: block the highest-volume attacking IPs and ASNs at the WAF
      or API gateway layer. Implement aggressive rate limiting on authentication endpoints
      (e.g., 5 requests/minute per IP). Add CAPTCHA challenges for suspicious traffic patterns.
      If using a CDN/WAF (Cloudflare, Akamai, AWS WAF), activate bot management rules and
      enable enhanced bot detection. Consider temporarily geo-blocking countries that have no
      legitimate user base.
    automation_hint: >
      Cloudflare: POST /zones/<zone>/firewall/rules — add IP block rules
      AWS WAF: aws wafv2 update-ip-set --scope REGIONAL --id <set-id> --addresses <attacker_cidrs>
      nginx rate limiting: limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
      API Gateway: aws apigateway update-stage --rest-api-id <id> --stage-name prod
      --patch-ops op=replace,path=/defaultRouteSettings/throttlingBurstLimit,value=10
    outputs:
      - ips_blocked
      - rate_limiting_applied
      - captcha_enabled

  - id: step-5
    name: Revoke compromised tokens and force password resets
    type: action
    tool: identity_provider
    description: >
      For all accounts identified as compromised (successful login during attack or impossible
      travel detected), immediately revoke all active sessions and API tokens. Force a password
      reset via email or admin console. If MFA is not enrolled, require MFA enrollment as part
      of the reset flow. Notify affected users with clear instructions and a support contact.
      Generate new API keys for affected service accounts and distribute via secure channels.
    automation_hint: >
      Okta: POST /api/v1/users/<userId>/sessions — DELETE (revoke all sessions)
      Auth0: DELETE /api/v2/users/<user_id>/sessions
      AWS Cognito: aws cognito-idp admin-user-global-sign-out --user-pool-id <pool> --username <user>
      Azure AD: Revoke-AzureADUserAllRefreshToken -ObjectId <user_object_id>
      Custom JWT: Increment token version in user store to invalidate all existing JWTs
    outputs:
      - sessions_revoked
      - password_resets_forced
      - mfa_enrollment_required
      - users_notified

  - id: step-6
    name: Enumerate accounts successfully compromised and assess data accessed
    type: investigation
    tool: siem
    description: >
      For each account confirmed as compromised, perform a detailed audit of all API calls made
      during the attacker-controlled session: data read/exported, configuration changes, privilege
      escalation attempts, and lateral movement. Check for new API keys created, OAuth app grants,
      webhook registrations, or data exports. Determine if any sensitive data was exfiltrated and
      the scope of PII/financial data exposure.
    automation_hint: >
      Filter logs by compromised session token: index=api_logs token=<compromised_token>
      | stats values(uri) as endpoints_hit, sum(response_bytes) as bytes_out by user
      Look for: POST /exports, GET /users, GET /admin, POST /webhooks, POST /oauth/authorize
      AWS CloudTrail: filter by source IP of attacker, enumerate all API calls
    outputs:
      - compromised_account_list
      - data_accessed_per_account
      - pii_exposure_scope
      - actions_taken_by_attacker

  - id: step-7
    name: Deploy long-term bot mitigation controls
    type: action
    tool: api_gateway
    description: >
      Implement durable bot mitigation: device fingerprinting on authentication endpoints,
      behavioral analysis to distinguish bots from humans, credential stuffing-specific rules
      in WAF (known credential breach lists), API token binding to client certificates or device
      fingerprints, and integration with HaveIBeenPwned or similar breach data feeds to
      proactively force password resets for users with credentials found in breaches.
    automation_hint: >
      HaveIBeenPwned API: GET https://haveibeenpwned.com/api/v3/breachedaccount/<account>
      Cloudflare Bot Management: enable via dashboard or API
      Shape Security / Akamai Bot Manager: configure credential stuffing rules
      Add IP reputation enrichment: query abuse.ch, Shodan, or IPQualityScore for attacker IPs
    outputs:
      - bot_mitigation_deployed
      - breach_feed_integrated
      - device_fingerprinting_enabled

  - id: step-8
    name: Notify security, compliance, and affected users
    type: notification
    description: >
      Notify internal stakeholders: security leadership of attack scope and containment status,
      product/engineering team of any API changes deployed, and legal/compliance if user data
      was accessed without authorization (potential breach notification trigger). Send user
      notifications to compromised accounts with password reset instructions, advice to check
      other sites where they may reuse passwords, and recommendation to enable MFA.
    automation_hint: >
      PagerDuty: pd incident create --title "IR-012 Credential Stuffing Active"
      Email notifications: use SMTP relay or SendGrid API for bulk user reset notifications
      Slack alert to #security-incidents with attack stats and remediation status
    outputs:
      - internal_notifications_sent
      - user_notifications_sent
      - breach_notification_assessed

  - id: step-9
    name: Review and harden API authentication architecture
    type: action
    tool: api_gateway
    description: >
      Conduct a post-incident review of the API authentication architecture. Assess whether
      short-lived tokens (JWT with 15-minute expiry) replace long-lived API keys, whether
      PKCE is enforced for OAuth flows, whether token binding is implemented, and whether
      the authentication endpoints have dedicated monitoring. Recommend multi-factor
      authentication for all user-facing API authentication flows.
    automation_hint: >
      Review OAuth 2.0 configuration for PKCE: check authorization_code_challenge_method=S256
      JWT expiry audit: decode existing JWTs and check exp claim values
      AWS Cognito: aws cognito-idp describe-user-pool --user-pool-id <id> | jq '.UserPool.Policies'
    outputs:
      - auth_architecture_reviewed
      - hardening_recommendations
      - mfa_enforcement_plan

  - id: step-10
    name: Document attack timeline and metrics
    type: investigation
    tool: siem
    description: >
      Compile the complete attack timeline: first malicious request, peak attack volume, first
      detection, time to containment, accounts compromised, and data accessed. Record all
      indicators of compromise (IOCs): attacker IPs, ASNs, user-agents, attack tools identified,
      and any C2 infrastructure. Share relevant IOCs with threat intelligence partners and ISAC.
    automation_hint: >
      Export attacker IPs to MISP or STIX/TAXII feed for threat intelligence sharing
      Build timeline: siem query ordered by time, export to incident report template
      OSINT on attacker IPs: Shodan, Censys, VirusTotal, AbuseIPDB lookups
    outputs:
      - attack_timeline
      - ioc_list
      - threat_intel_shared

post_incident:
  - Implement adaptive rate limiting with exponential backoff for repeated authentication failures
  - Deploy credential breach monitoring — proactively notify users whose credentials appear in breach databases
  - Enforce MFA for all user accounts — remove legacy password-only authentication flows
  - Implement API token binding to client device or certificate to prevent token theft replay
  - Integrate bot protection solution (Cloudflare Bot Management, Akamai Bot Defender, or AWS WAF Bot Control)
  - Enable real-time impossible travel detection with automatic session revocation in IdP
  - Rotate all API keys that were active during the attack window as a precaution
  - Conduct purple team exercise testing credential stuffing defenses end-to-end
  - Review password policy — enforce minimum complexity, breach database checks at password set/change

metrics:
  avg_resolution_time: 60m
  false_positive_rate: 20%
  escalation_rate: 35%
